name: 💡 Feature Request
description: 기능 추가/개선 제안
labels: ["enhancement"]
body:
  - type: textarea
    id: feature
    attributes:
      label: 어떤 기능이 필요한가요?
      description: 제안하고 싶은 기능을 간결히 설명해주세요.
      placeholder: 예) 다크/라이트 테마 토글
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: 왜 필요한가요? (사용 시나리오)
      description: 어떤 상황에서 이 기능이 도움이 되는지 설명해주세요.
      placeholder: 예) 낮에는 라이트 테마가 눈에 편하고, 다른 앱들과 톤이 맞음
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 대안 / 우회 방법 (선택)
      description: 현재 어떻게 우회하고 있거나, 다른 해결 방법이 떠오르면 적어주세요.
  - type: textarea
    id: additional
    attributes:
      label: 추가 정보 (선택)
      description: 참고 자료, 스크린샷, mockup 등 있으면 첨부해주세요.
